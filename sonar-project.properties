# SonarCloud Configuration
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# Project identification
sonar.organization=williajm
sonar.projectKey=williajm_mcp_docker
sonar.projectName=MCP Docker Server
# Keep in sync with the version in pyproject.toml when preparing a release
sonar.projectVersion=2.0.1

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Python configuration
sonar.python.version=3.11,3.12,3.13,3.14

# Coverage report location
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate - Strict Configuration
# Fail on any new issues
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# New Code Quality Thresholds (stricter than default)
# On PRs this cleanly diffs against main, but when analysing main itself it is
# degenerate (main vs main has no baseline, so ALL code counts as new).
# TODO(#228): set the main branch's New Code definition to "previous version"
# in the SonarCloud project settings UI (not settable from this file).
sonar.newCode.referenceBranch=main

# Coverage requirements
sonar.coverage.exclusions=tests/**/*,**/*_test.py,**/test_*.py
