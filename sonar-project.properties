# SonarCloud Configuration
# https://docs.sonarcloud.io/advanced-setup/analysis-parameters/

# Project identification
sonar.organization=williajm
sonar.projectKey=williajm_mcp_docker
sonar.projectName=MCP Docker Server
# Keep in sync with the version in pyproject.toml when preparing a release
sonar.projectVersion=2.0.1

# Source and test directories
sonar.sources=src
sonar.tests=tests

# Python configuration
sonar.python.version=3.11,3.12,3.13,3.14

# Coverage report location
sonar.python.coverage.reportPaths=coverage.xml

# Encoding
sonar.sourceEncoding=UTF-8

# Quality Gate - Strict Configuration
# Fail on any new issues
sonar.qualitygate.wait=true
sonar.qualitygate.timeout=300

# New code definition: intentionally NOT set here. The project's New Code
# setting in the SonarCloud UI is "previous version" (keyed off
# sonar.projectVersion above), and PR analyses baseline against the PR base
# automatically. A scanner-side sonar.newCode.referenceBranch would override
# the UI setting on every analysis; with referenceBranch=main that made the
# main-branch analysis degenerate (main vs main = no baseline, so ALL code
# counted as new and every historical bug failed the gate — issue #228).

# Coverage requirements
sonar.coverage.exclusions=tests/**/*,**/*_test.py,**/test_*.py
